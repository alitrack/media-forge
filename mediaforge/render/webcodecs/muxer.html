<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MediaForge WebCodecs Export</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: system-ui, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    gap: 20px;
  }
  .status { font-size: 14px; opacity: 0.7; }
  .progress-bar {
    width: 300px; height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #e94560;
    transition: width 0.1s linear;
    width: 0%;
  }
  .error { color: #e94560; font-size: 13px; max-width: 400px; text-align: center; }
</style>
</head>
<body>
  <h2>MediaForge Export</h2>
  <div class="status" id="status">Initializing...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div class="error" id="error"></div>

<script type="module">
import { Muxer, ArrayBufferTarget } from "https://cdn.jsdelivr.net/npm/mp4-muxer@5.1/+esm";

const statusEl = document.getElementById("status");
const progressEl = document.getElementById("progress");
const errorEl = document.getElementById("error");

// ── Config from URL params ──────────────────────────────
const params = new URLSearchParams(window.location.search);
const framesUrl = params.get("frames") || "";
const audioUrl = params.get("audio") || "";
const fps = parseInt(params.get("fps") || "30", 10);
const width = parseInt(params.get("width") || "1920", 10);
const height = parseInt(params.get("height") || "1080", 10);

if (!framesUrl) {
  errorEl.textContent = "Missing 'frames' URL parameter";
  throw new Error("Missing frames URL");
}

// ── Helpers ──────────────────────────────────────────────
function setProgress(pct) {
  progressEl.style.width = Math.min(100, Math.max(0, pct)) + "%";
}

function setStatus(msg) {
  statusEl.textContent = msg;
  console.log("[WebCodecs]", msg);
}

async function fetchWithTimeout(url, timeoutMs = 30000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp;
  } finally {
    clearTimeout(timer);
  }
}

// ── 1. Discover frames ───────────────────────────────────
setStatus("Discovering frames...");

const frameListResp = await fetchWithTimeout(framesUrl + "?list");
const frameFiles = await frameListResp.json();

if (!frameFiles.length) {
  throw new Error("No frames found");
}
setStatus(`Found ${frameFiles.length} frames`);

// ── 2. Decode audio ──────────────────────────────────────
let audioFrames = [];
if (audioUrl) {
  setStatus("Decoding audio...");
  try {
    const audioResp = await fetchWithTimeout(audioUrl);
    const audioBuffer = await audioResp.arrayBuffer();

    const audioCtx = new OfflineAudioContext({
      numberOfChannels: 2,
      length: 1,
      sampleRate: 48000,
    });
    const audioDecoded = await audioCtx.decodeAudioData(audioBuffer);

    // Convert to PCM for AudioEncoder
    const pcmLeft = audioDecoded.getChannelData(0);
    const pcmRight = audioDecoded.numberOfChannels > 1
      ? audioDecoded.getChannelData(1)
      : pcmLeft;

    // Interleave stereo PCM into single buffer
    const pcmData = new Float32Array(pcmLeft.length * 2);
    for (let i = 0; i < pcmLeft.length; i++) {
      pcmData[i * 2] = pcmLeft[i];
      pcmData[i * 2 + 1] = pcmRight[i];
    }

    // Split into 20ms frames
    const samplesPerFrame = Math.floor(audioDecoded.sampleRate * 0.02) * 2;
    for (let offset = 0; offset < pcmData.length; offset += samplesPerFrame) {
      const chunk = pcmData.slice(offset, offset + samplesPerFrame);
      if (chunk.length < samplesPerFrame) break;
      audioFrames.push({ data: chunk, timestamp: offset / 2 / audioDecoded.sampleRate * 1_000_000 });
    }
    setStatus(`Audio decoded: ${audioFrames.length} frames`);
  } catch (e) {
    console.warn("Audio decode failed, exporting video only:", e);
    setStatus("Audio decode failed — video only");
  }
}

// ── 3. Setup muxer ───────────────────────────────────────
const muxerConfig = {
  target: new ArrayBufferTarget(),
  video: {
    codec: "avc",
    width,
    height,
  },
  fastStart: "in-memory",
};

if (audioFrames.length > 0) {
  muxerConfig.audio = {
    codec: "aac",
    numberOfChannels: 2,
    sampleRate: 48000,
  };
}

const muxer = new Muxer(muxerConfig);

// ── 4. Setup encoders ────────────────────────────────────
let encodedVideoFrames = 0;
let encodedAudioFrames = 0;
const totalFrames = frameFiles.length;
const totalAudioFrames = audioFrames.length;

// Video encoder
const videoEncoder = new VideoEncoder({
  output: (chunk, meta) => {
    muxer.addVideoChunk(chunk, meta);
    encodedVideoFrames++;
  },
  error: (e) => {
    console.error("VideoEncoder error:", e);
    errorEl.textContent = "Video encoder error: " + e.message;
  },
});

const videoConfig = {
  codec: "avc1.42001f",  // H.264 Baseline
  width,
  height,
  bitrate: 8_000_000,
  framerate: fps,
};
const videoSupport = await VideoEncoder.isConfigSupported(videoConfig);
if (!videoSupport.supported) {
  throw new Error("H.264 encoding not supported in this browser");
}
videoEncoder.configure(videoConfig);

// Audio encoder (if we have audio)
let audioEncoder = null;
if (audioFrames.length > 0) {
  audioEncoder = new AudioEncoder({
    output: (chunk, meta) => {
      muxer.addAudioChunk(chunk, meta);
      encodedAudioFrames++;
    },
    error: (e) => {
      console.error("AudioEncoder error:", e);
      errorEl.textContent = "Audio encoder error: " + e.message;
    },
  });

  const audioSupport = await AudioEncoder.isConfigSupported({
    codec: "mp4a.40.2",
    numberOfChannels: 2,
    sampleRate: 48000,
    bitrate: 128_000,
  });
  if (audioSupport.supported) {
    audioEncoder.configure({
      codec: "mp4a.40.2",
      numberOfChannels: 2,
      sampleRate: 48000,
      bitrate: 128_000,
    });
  } else {
    setStatus("AAC encoding not supported — video only");
    audioFrames = [];
    audioEncoder = null;
  }
}

// ── 5. Encode frames ─────────────────────────────────────
setStatus("Encoding frames...");
const frameInterval = 1_000_000 / fps;  // microseconds per frame

for (let i = 0; i < frameFiles.length; i++) {
  const fname = frameFiles[i];
  try {
    const resp = await fetchWithTimeout(framesUrl + "/" + encodeURIComponent(fname));
    const blob = await resp.blob();
    const bitmap = await createImageBitmap(blob);

    const videoFrame = new VideoFrame(bitmap, {
      timestamp: i * frameInterval,
      duration: frameInterval,
    });
    videoEncoder.encode(videoFrame);
    videoFrame.close();
    bitmap.close();

    if (i % 10 === 0) {
      setProgress((i / totalFrames) * 100);
      setStatus(`Encoding frame ${i + 1}/${totalFrames}`);
    }
  } catch (e) {
    console.error(`Frame ${i} failed:`, e);
  }
}

setProgress(95);
setStatus("Flushing video encoder...");
await videoEncoder.flush();
videoEncoder.close();

// ── 6. Encode audio ──────────────────────────────────────
if (audioEncoder && audioFrames.length > 0) {
  setStatus("Encoding audio...");
  for (const frame of audioFrames) {
    const audioData = new AudioData({
      format: "f32-planar",
      sampleRate: 48000,
      numberOfFrames: frame.data.length / 2,
      numberOfChannels: 2,
      timestamp: frame.timestamp,
      data: (() => {
        // Split interleaved back to planar
        const len = frame.data.length / 2;
        const left = new Float32Array(len);
        const right = new Float32Array(len);
        for (let j = 0; j < len; j++) {
          left[j] = frame.data[j * 2];
          right[j] = frame.data[j * 2 + 1];
        }
        return (() => {
          const buf = new ArrayBuffer(left.byteLength + right.byteLength);
          new Float32Array(buf, 0, len).set(left);
          new Float32Array(buf, left.byteLength, len).set(right);
          return buf;
        })();
      })(),
    });
    audioEncoder.encode(audioData);
    audioData.close();
  }
  await audioEncoder.flush();
  audioEncoder.close();
}

// ── 7. Finalize ──────────────────────────────────────────
setProgress(99);
setStatus("Finalizing...");
muxer.finalize();

const { buffer } = muxer.target;
const blob = new Blob([buffer], { type: "video/mp4" });

// ── 8. Download ──────────────────────────────────────────
setProgress(100);
setStatus(`Complete: ${(buffer.byteLength / 1024 / 1024).toFixed(1)} MB`);

// Trigger download
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "webcodecs_output.mp4";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);

// Signal Python that download started
document.title = "DONE";
</script>
</body>
</html>
